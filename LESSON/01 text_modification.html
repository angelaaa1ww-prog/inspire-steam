<html>
    <head>
        <title>Module01: h1. h2 , p, em, div</title>
    </head>

    <body>
        <h1>Music Band</h1>
        <hr>

        <h2>About The Band</h2>

         <div>
            <!--em (emphasis) b (bold)-->
            <p>Rediscovering Music, <em>One Album at a time</em></p>
            <p>Est <b>2026</b></p>

            <!--small (small text) and i (italic)-->
            <p><small><i>Find our Merch at ebay.com</i></small></p>
            
            <hr>
        <div>

        <div>
            <!--sub (subscript), sup (superscript), li-->
            <h3>Discover</h3>
            <li>H <sub>2</sub>o</li>
            <li>E is MC <sup>2</sup></li>

            <h4>Lyrics H <sub>2</sub>o</h4>
            <i>
                I dont care  I just want to sleep,<br><br>
                I am so tired, bring chicken nuggets,
            </i>
        </div>
    </body>
</html>
