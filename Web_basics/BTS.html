<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stray Kids Fan Page</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: #e2e8f0;
    }

    /* NAVBAR */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    nav h1 {
        font-family: 'Orbitron', sans-serif;
        color: #f87171;
        letter-spacing: 2px;
    }

    nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        transition: 0.3s;
    }

    nav a:hover {
        color: #f87171;
    }

    /* HERO */
    header {
        text-align: center;
        padding: 60px 20px;
        background: linear-gradient(90deg, #8b0000, #000000);
        box-shadow: 0 5px 30px rgba(0,0,0,0.6);
    }

    header h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 3rem;
        letter-spacing: 4px;
        text-shadow: 0 0 15px rgba(255,0,0,0.7);
    }

    header p {
        margin-top: 10px;
        opacity: 0.8;
    }

    .container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 20px;
    }

    .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    }

    h2 {
        margin-bottom: 15px;
        color: #f87171;
        font-weight: 600;
        letter-spacing: 1px;
    }

    video {
        width: 100%;
        border-radius: 12px;
    }

    audio {
        width: 100%;
        margin-top: 10px;
    }

    .lyrics {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        line-height: 1.9;
        background: rgba(0,0,0,0.4);
        padding: 15px;
        border-radius: 10px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    .gallery img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 12px;
        transition: 0.4s;
    }

    .gallery img:hover {
        transform: scale(1.08);
        filter: brightness(1.2);
    }

    footer {
        text-align: center;
        padding: 20px;
        background: #020617;
        opacity: 0.7;
        font-size: 0.9rem;
        letter-spacing: 1px;
    }

    /* RESPONSIVE */
    @media(max-width: 600px) {
        header h1 {
            font-size: 2rem;
        }
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h1>SKZ</h1>
    <div>
        <a href="#">Home</a>
        <a href="#">Music</a>
        <a href="#">Gallery</a>
    </div>
</nav>

<!-- HERO -->
<header>
    <h1>Stray Kids 🔥</h1>
    <p>Stay with the sound. Stay with the energy.</p>
</header>

<div class="container">

    <!-- VIDEO -->
    <div class="card">
        <h2>🎬 Featured Video</h2>
        <video controls>
            <source src="./Assets/video/Stray Kids 神메뉴(God's Menu) M_V.mp4" type="video/mp4">
        </video>
    </div>

    <!-- AUDIO -->
    <div class="card">
        <h2>🎧 Audio Experience</h2>
        <audio controls>
            <source src="./Assets/audio/Stray Kids 神메뉴(God's Menu) MV.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- LYRICS -->
    <div class="card">
        <h2>📝 Lyrics</h2>
        <div class="lyrics">
            Cooking like a chef, I'm a 5-star Michelin 🍜 <br><br>
            미슐랭 <br><br>
            Whatever you want, I'll serve it <br>
            Because we’re Stray Kids 🔥
        </div>
    </div>

    <!-- GALLERY -->
    <div class="card">
        <h2>📸 Gallery</h2>
        <div class="gallery">
            <img src="./Assets/Image/download.webp">
            <img src="./Assets/Image/download (1).webp">
            <img src="./Assets/Image/download (2).webp">
        </div>
    </div>

</div>

<footer>
    <p>Made for STAY ✨ | Stray Kids Fan Page</p>
</footer>

</body>
</html>
