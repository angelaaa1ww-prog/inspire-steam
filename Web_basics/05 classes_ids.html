<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module05: Classes, ids</title>

    <style>
        body{
             background-color: black;
             color: beige;
             font-family: Georgia, 'Times New Roman', Times, serif;
             margin: 0;
             padding: 0;
        }
        #page-wrapper{
              max-width:700px;
              margin: 0 auto;
              padding: 40px 24px;
            }
         
        .band-photos{
            width: 300px;
            height:300px;
            object-fit: cover;
        } 
        #photos{
            background-color: antiquewhite;
            
        }
        #listen-section{
            position: relative;
            display:flex;
            justify-content: center;
            align-content: center;
            width: 500px;
            height: 500px;
            background-color: rgb(173, 110, 33);
        }      
    </style>
  </head>
  <body>
    <!--
        id: inique, only one element in a page should have it

        class: reusable, used to identify multiple elemnts together
    -->
    <div id="page-wrapper">
        <h1>Taylor Swift</h1>
        <p>Disc: Wildest Dreams</p>
        <div id="photos">
            <img class="Band-photos" src="./Assets/Image/download.webp" alt="Band-photo">
            <img class="Band-photos" src="./Assets/Image/uwp4615492.jpeg" alt="Band-photo">
        </div>

        <div id="listen-section">
            <p class="song">Latest song</p>
            <p class="song">Ealier song</p>
        </div>
    </div>
 </body>
</html>
